<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0A0C"/>

  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo mark -->
  <circle cx="120" cy="315" r="14" fill="#ffffff"/>
  <line x1="72" y1="315" x2="120" y2="315" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <line x1="120" y1="315" x2="180" y2="265" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="180" cy="265" r="10" stroke="#ffffff" stroke-width="7" fill="none"/>
  <line x1="120" y1="315" x2="180" y2="365" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="180" cy="365" r="10" stroke="#ffffff" stroke-width="7" fill="none"/>

  <!-- Wordmark -->
  <text x="212" y="335" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#EDE8DF" letter-spacing="-1">altlife</text>

  <!-- Tagline -->
  <text x="120" y="415" font-family="'Courier New', monospace" font-size="22" fill="rgba(237,232,223,0.45)" letter-spacing="3">SIMULATE YOUR LIFE DECISIONS WITH AI</text>

  <!-- Pill tags -->
  <rect x="120" y="460" width="160" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="200" y="483" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" text-anchor="middle">multi-agent AI</text>

  <rect x="296" y="460" width="160" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="376" y="483" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" text-anchor="middle">12-month outlook</text>

  <rect x="472" y="460" width="160" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="552" y="483" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" text-anchor="middle">real-world data</text>
